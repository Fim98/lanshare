name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Build app
        run: make build

      - name: Package app
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          ZIP_NAME="LanShare-${TAG_NAME}.zip"
          ditto -c -k --sequesterRsrc --keepParent "dist/LanShare.app" "dist/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
          generate_release_notes: true
