name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build app
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanShare-${{ github.ref_name }}
          path: dist/LanShare.app
          retention-days: 30

      - name: Package app
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ZIP_NAME="LanShare-${TAG_NAME}.zip"
          ditto -c -k --sequesterRsrc --keepParent "dist/LanShare.app" "dist/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
          generate_release_notes: true
